<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ทำควิซ</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="leave-banner" id="banner">⚠️ ตรวจพบว่าคุณออกจากหน้าจอ — ผู้สร้างควิซจะเห็นบันทึกนี้</div>

  <header class="top">
    <h1 id="qtitle">กำลังโหลด…</h1>
    <p id="qdesc"></p>
  </header>

  <div class="wrap">
    <!-- ขั้นใส่ชื่อ -->
    <div id="intro" class="card" style="display:none">
      <h2>ก่อนเริ่มทำ</h2>
      <label>ชื่อของคุณ</label>
      <input type="text" id="name" placeholder="พิมพ์ชื่อ-นามสกุล หรือชื่อเล่น">
      <p class="muted">📌 ระหว่างทำ ระบบจะบันทึกหากคุณ <b>สลับแท็บ / ย่อจอ / ปัดออกจากหน้านี้</b>
        เพื่อความโปร่งใสในการทำแบบทดสอบ</p>
      <button class="btn" onclick="start()">เริ่มทำควิซ →</button>
    </div>

    <!-- ตัวควิซ -->
    <form id="quizForm" style="display:none"></form>
    <div id="submitRow" class="row" style="display:none">
      <div class="muted" id="leaveCounter">ยังไม่ออกจากหน้าจอ 👍</div>
      <div class="spacer"></div>
      <button class="btn" onclick="submitQuiz()">ส่งคำตอบ</button>
    </div>

    <!-- ผลลัพธ์ -->
    <div id="result" class="card" style="display:none">
      <h2>✅ ส่งคำตอบเรียบร้อย</h2>
      <div class="stat">
        <div><div class="n" id="score">-</div><div class="l">คะแนนที่ได้</div></div>
        <div><div class="n" id="leaveResult">-</div><div class="l">จำนวนครั้งที่ออกจากจอ</div></div>
      </div>
      <p class="muted">ขอบคุณที่ทำแบบทดสอบ 🙏</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const quizId = params.get('id');
    let quiz = null;
    let sessionId = 's_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    let userName = '';
    let leaveCount = 0;
    let hiddenAt = 0;
    let finished = false;

    async function load() {
      if (!quizId) { document.getElementById('qtitle').textContent = 'ลิงก์ไม่ถูกต้อง'; return; }
      const res = await fetch(`/api/quizzes/${quizId}`);
      if (!res.ok) { document.getElementById('qtitle').textContent = 'ไม่พบควิซนี้'; return; }
      quiz = await res.json();
      document.getElementById('qtitle').textContent = quiz.title;
      document.getElementById('qdesc').textContent = quiz.description || '';
      document.getElementById('intro').style.display = 'block';
    }

    function start() {
      userName = document.getElementById('name').value.trim();
      if (!userName) { alert('กรุณาใส่ชื่อก่อนเริ่มทำ'); return; }
      document.getElementById('intro').style.display = 'none';

      const form = document.getElementById('quizForm');
      form.style.display = 'block';
      form.innerHTML = quiz.questions.map((q, i) => `
        <div class="card">
          <h2>ข้อ ${i + 1}. ${escapeHtml(q.text)}</h2>
          ${q.choices.map((c, ci) => c.trim() === '' ? '' : `
            <label class="opt" id="opt-${i}-${ci}">
              <input type="radio" name="q${i}" value="${ci}" onchange="selectOpt(${i},${ci})">
              <span class="letter">${'ABCD'[ci]}</span>
              <span>${escapeHtml(c)}</span>
            </label>`).join('')}
        </div>`).join('');
      document.getElementById('submitRow').style.display = 'flex';

      enableLeaveTracking();
    }

    function selectOpt(i, ci) {
      quiz.questions[i].choices.forEach((_, k) => {
        const el = document.getElementById(`opt-${i}-${k}`);
        if (el) el.classList.toggle('sel', k === ci);
      });
    }

    // ---------- ระบบตรวจจับการออกจากหน้าจอ ----------
    function enableLeaveTracking() {
      document.addEventListener('visibilitychange', () => {
        if (finished) return;
        if (document.hidden) onLeave('สลับแท็บ/ย่อจอ');
        else onReturn();
      });
      // สลับไปแอปอื่นบนเดสก์ท็อป (บางกรณี visibility ไม่ยิง)
      window.addEventListener('blur', () => { if (!finished && !document.hidden) onLeave('สลับหน้าต่าง'); });
      // ปิดแท็บ/รีเฟรช/ปัดออกบนมือถือ
      window.addEventListener('pagehide', () => { if (!finished) sendEvent('leave', 'ปิด/ปัดออก', 0); });
    }

    function onLeave(reason) {
      hiddenAt = Date.now();
      leaveCount++;
      updateCounter();
      showBanner();
      sendEvent('leave', reason, 0);
    }
    function onReturn() {
      const away = hiddenAt ? Date.now() - hiddenAt : 0;
      hiddenAt = 0;
      hideBanner();
      sendEvent('return', '', away);
    }

    function sendEvent(type, reason, awayMs) {
      const payload = JSON.stringify({ sessionId, name: userName, type, reason, awayMs });
      const url = `/api/quizzes/${quizId}/events`;
      // sendBeacon ทำงานได้แม้ตอนกำลังปิดหน้า
      if (navigator.sendBeacon) {
        navigator.sendBeacon(url, new Blob([payload], { type: 'application/json' }));
      } else {
        fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payload, keepalive: true });
      }
    }

    function updateCounter() {
      const c = document.getElementById('leaveCounter');
      c.innerHTML = leaveCount === 0
        ? 'ยังไม่ออกจากหน้าจอ 👍'
        : `<span class="pill r">ออกจากจอแล้ว ${leaveCount} ครั้ง</span>`;
    }
    let bannerTimer = null;
    function showBanner() {
      const b = document.getElementById('banner');
      b.classList.add('show');
      clearTimeout(bannerTimer);
    }
    function hideBanner() {
      bannerTimer = setTimeout(() => document.getElementById('banner').classList.remove('show'), 1200);
    }

    // ---------- ส่งคำตอบ ----------
    async function submitQuiz() {
      const answers = quiz.questions.map((_, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        return sel ? parseInt(sel.value, 10) : -1;
      });
      const unanswered = answers.filter((a) => a === -1).length;
      if (unanswered > 0 && !confirm(`ยังไม่ได้ตอบ ${unanswered} ข้อ ต้องการส่งเลยไหม?`)) return;

      finished = true;
      const res = await fetch(`/api/quizzes/${quizId}/responses`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, name: userName, answers }),
      });
      const data = await res.json();

      document.getElementById('quizForm').style.display = 'none';
      document.getElementById('submitRow').style.display = 'none';
      document.getElementById('banner').classList.remove('show');
      document.getElementById('result').style.display = 'block';
      document.getElementById('score').textContent = `${data.score}/${data.total}`;
      document.getElementById('leaveResult').textContent = leaveCount;
      window.scrollTo(0, 0);
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    load();
  </script>
</body>
</html>
