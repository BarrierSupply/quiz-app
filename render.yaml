services:
  - type: web
    name: quiz-app
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_EMAIL
        value: admin12345@teacher.com
    disk:
      name: quiz-data
      mountPath: /var/data
      sizeGB: 1
